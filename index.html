<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → PNG Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --text: #e0e0e0;
    --muted: #555;
    --success: #00ff88;
    --error: #ff4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 6px;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  /* Drop Zone */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--surface);
  }

  #dropzone.drag-over {
    border-color: var(--accent);
    background: #1a1a00;
  }

  #dropzone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  #dropzone h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 8px;
  }

  #dropzone p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Settings */
  .settings {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .settings label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .settings select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
  }

  /* File List */
  #file-list {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }

  .file-item.done { border-color: var(--success); }
  .file-item.error { border-color: var(--error); }
  .file-item.processing { border-color: var(--accent); }

  .file-name {
    flex: 1;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-status {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 90px;
    text-align: right;
  }

  .file-item.done .file-status { color: var(--success); }
  .file-item.error .file-status { color: var(--error); }
  .file-item.processing .file-status { color: var(--accent); }

  .progress-bar {
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .file-item.done .progress-fill { background: var(--success); width: 100%; }

  /* Buttons */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 2px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #convert-btn {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    flex: 1;
  }

  #convert-btn:hover { background: #fff; }
  #convert-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  #clear-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  #clear-btn:hover { color: var(--text); border-color: var(--text); }

  /* Summary */
  #summary {
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    display: none;
  }

  #summary span { color: var(--success); }

  .page-badge {
    background: var(--border);
    border-radius: 2px;
    padding: 2px 6px;
    font-size: 10px;
    color: var(--muted);
    margin-left: 6px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>PDF → PNG</h1>
    <p>Up to 20 PDFs · All pages · Original filenames</p>
  </header>

  <div id="dropzone">
    <input type="file" id="file-input" accept=".pdf" multiple>
    <span class="drop-icon">⬛</span>
    <h2>Drop PDFs Here</h2>
    <p>or click to browse · max 20 files</p>
  </div>

  <div class="settings">
    <label>
      Quality / DPI
      <select id="dpi-select">
        <option value="72">72 dpi — screen</option>
        <option value="150" selected>150 dpi — standard</option>
        <option value="300">300 dpi — print</option>
      </select>
    </label>
  </div>

  <div id="file-list"></div>

  <div class="actions" id="actions" style="display:none">
    <button id="convert-btn">Convert All</button>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="summary"></div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let selectedFiles = [];

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const fileList = document.getElementById('file-list');
  const actions = document.getElementById('actions');
  const convertBtn = document.getElementById('convert-btn');
  const clearBtn = document.getElementById('clear-btn');
  const summary = document.getElementById('summary');
  const dpiSelect = document.getElementById('dpi-select');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
  });

  fileInput.addEventListener('change', () => {
    addFiles(Array.from(fileInput.files));
    fileInput.value = '';
  });

  function addFiles(files) {
    files.forEach(f => {
      if (selectedFiles.length >= 20) return;
      if (selectedFiles.find(x => x.name === f.name && x.size === f.size)) return;
      selectedFiles.push(f);
    });
    renderList();
  }

  function renderList() {
    fileList.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.id = `file-${i}`;
      item.innerHTML = `
        <span class="file-name">${f.name}</span>
        <div class="progress-bar"><div class="progress-fill" id="prog-${i}"></div></div>
        <span class="file-status" id="status-${i}">Queued</span>
      `;
      fileList.appendChild(item);
    });
    actions.style.display = selectedFiles.length ? 'flex' : 'none';
    summary.style.display = 'none';
    convertBtn.disabled = false;
  }

  clearBtn.addEventListener('click', () => {
    selectedFiles = [];
    fileList.innerHTML = '';
    actions.style.display = 'none';
    summary.style.display = 'none';
  });

  convertBtn.addEventListener('click', async () => {
    convertBtn.disabled = true;
    const dpi = parseInt(dpiSelect.value);
    const scale = dpi / 72;
    let done = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const item = document.getElementById(`file-${i}`);
      const statusEl = document.getElementById(`status-${i}`);
      const progEl = document.getElementById(`prog-${i}`);

      item.className = 'file-item processing';
      statusEl.textContent = 'Converting...';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        const baseName = file.name.replace(/\.pdf$/i, '');

        for (let p = 1; p <= totalPages; p++) {
          const page = await pdf.getPage(p);
          const viewport = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;

          const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = totalPages === 1 ? `${baseName}.png` : `${baseName}_page${p}.png`;
          a.click();
          URL.revokeObjectURL(url);

          progEl.style.width = `${(p / totalPages) * 100}%`;
          await new Promise(r => setTimeout(r, 80));
        }

        item.className = 'file-item done';
        statusEl.textContent = totalPages === 1 ? '1 page ✓' : `${totalPages} pages ✓`;
        done++;

      } catch (err) {
        item.className = 'file-item error';
        statusEl.textContent = 'Error ✗';
        console.error(err);
      }
    }

    summary.style.display = 'block';
    summary.innerHTML = `<span>${done}/${selectedFiles.length}</span> files converted successfully`;
    convertBtn.disabled = false;
  });
</script>
</body>
</html>
